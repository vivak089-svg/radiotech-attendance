<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiotech NDT Attendance System</title>
<style>
body { font-family: Arial, sans-serif; background:#f4f7f6; padding:20px; }
.container { max-width:800px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
h1,h3 { text-align:center; }
input,select,button { width:100%; padding:10px; margin-top:5px; }
table { width:100%; margin-top:20px; border-collapse:collapse; }
th,td { border:1px solid #ddd; padding:10px; }
th { background:#003366; color:white; }
.delete-btn { background:red; color:white; border:none; padding:5px 10px; }
</style>
</head>
<body>
<div class="container">
<h1>Radiotech NDT TEST PVT LTD</h1>
<h3>Worker Attendance & Overtime Tracker</h3>

<form id="attendanceForm">
<label>Date</label>
<input type="date" id="date" required>

<label>Worker Name / ID</label>
<input type="text" id="workerName" required>

<label>Status</label>
<select id="status">
<option>Present</option>
<option>Absent</option>
<option>Half-Day</option>
</select>

<label>Overtime Hours</label>
<input type="number" id="overtime" value="0">

<button type="submit">Save Record</button>
</form>

<table>
<thead>
<tr>
<th>Date</th>
<th>Name</th>
<th>Status</th>
<th>OT</th>
<th>Action</th>
</tr>
</thead>
<tbody id="recordTableBody"></tbody>
</table>
</div>

<script>
document.getElementById('date').valueAsDate = new Date();
let records = JSON.parse(localStorage.getItem('radiotech_data')) || [];
const tbody = document.getElementById('recordTableBody');

function showData(){
tbody.innerHTML='';
records.forEach((r,i)=>{
tbody.innerHTML += `<tr>
<td>${r.date}</td>
<td>${r.name}</td>
<td>${r.status}</td>
<td>${r.overtime}</td>
<td><button class="delete-btn" onclick="del(${i})">Delete</button></td>
</tr>`;
});
}

document.getElementById('attendanceForm').addEventListener('submit',function(e){
e.preventDefault();
records.unshift({
date:date.value,
name:workerName.value,
status:status.value,
overtime:overtime.value
});
localStorage.setItem('radiotech_data',JSON.stringify(records));
showData();
this.reset();
});

function del(i){
records.splice(i,1);
localStorage.setItem('radiotech_data',JSON.stringify(records));
showData();
}
showData();
</script>
</body>
</html>
